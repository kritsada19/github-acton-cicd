name: CI with Database

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest

    env: # ระดับ job — ทุก step ใช้ได้
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm install

      - name: Debug secrets (safe)
        # This step intentionally DOES NOT print secret values.
        # It only prints whether each secret is set and its length (number of bytes).
        # Printing secret values is dangerous — avoid doing that in real workflows.
        run: |
          echo "DATABASE_URL set: $( [ -z \"$DATABASE_URL\" ] && echo no || echo yes )"
          echo -n "$DATABASE_URL" | wc -c | xargs -I{} echo "DATABASE_URL length: {}"
          echo -n "$REDIS_URL" | wc -c | xargs -I{} echo "REDIS_URL length: {}"
          echo -n "$STRIPE_SECRET_KEY" | wc -c | xargs -I{} echo "STRIPE_SECRET_KEY length: {}"

      - name: Run integration tests
        run: npx vitest run
        env: # ระดับ step — เฉพาะ step นี้
          WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
